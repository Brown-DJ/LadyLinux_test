<button id="ladyBtn" class="lady-btn" type="button" title="Open Lady panel">
  &#129504;
</button>

<div id="ladyPanel" class="lady-panel hidden" aria-hidden="true">
  <div class="lady-header">
    <span>Lady</span>
    <button id="ladyClose" class="lady-close" type="button" aria-label="Close Lady panel">
      &times;
    </button>
  </div>

  <div class="lady-actions">
    <button id="ladyRefreshMetrics" class="btn btn-sm btn-outline-light" type="button">
      Refresh Metrics
    </button>
    <button id="ladyToggleTheme" class="btn btn-sm btn-outline-light" type="button">
      Toggle Theme
    </button>
    <button
      data-fullscreen
      data-fullscreen-label="text"
      class="btn btn-sm btn-outline-light"
      type="button"
      title="Fullscreen"
    >
      Fullscreen
    </button>
  </div>

  <div id="lady-response"></div>

  <!-- Memory panel (collapsible) -->
  <div class="lady-memory mt-3" style="border-top: 1px solid var(--border-color); padding-top: 0.75rem;">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="fw-semibold" style="font-size: 0.8rem; color: var(--text-muted);">What Lady Remembers</span>
      <button
        type="button"
        class="btn btn-sm btn-outline-light p-0 px-1"
        id="ladyMemoryToggle"
        aria-expanded="true"
        aria-controls="ladyMemoryBody"
        title="Collapse"
        style="line-height: 1.2;"
      >
        <i class="bi bi-chevron-up" id="ladyMemoryChevron"></i>
      </button>
    </div>
    <div id="ladyMemoryBody">
      <!-- stubbed: will be populated by memory system -->
      <ul class="activity-log" id="ladyMemoryList" style="font-size: 0.8rem;">
        <li>Asked about firewall rules on the network page</li>
        <li>Prefers dark mode</li>
        <li>Restarted ladylinux-api.service during last session</li>
      </ul>
      <button type="button" class="btn btn-sm btn-outline-light mt-2 w-100" id="ladyMemoryClearBtn">
        <i class="bi bi-trash"></i> Clear memory
      </button>
    </div>
  </div>

  <!-- Wrap input + mic in a flex row -->
  <div class="lady-input d-flex align-items-center gap-2">
    <input id="lady-input" type="text" placeholder="Ask Lady..." autocomplete="off" style="flex:1" />
    <!-- Mic button for widget voice — same voice_client.js handler -->
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary"
      data-mic-btn
      data-voice-source="widget"
      title="Start voice input"
      aria-label="Voice input"
    >
      <i class="bi bi-mic"></i>
    </button>
  </div>
</div>
