<!-- templates/lady_panel.html -->
<!-- Widget: Orb (primary) + Expand menu (secondary utilities) -->
<!-- Orb click -> opens console panel directly -->
<!-- Expand click -> toggles utility tray (theme, fullscreen, refresh) -->

<!-- -- Widget root: fixed position handled by CSS -- -->
<div id="ladyRadialRoot" class="lady-widget-root">

  <!-- Utility tray - hidden by default, toggled by expand button -->
  <div id="ladyUtilityTray" class="lady-utility-tray" aria-hidden="true">

    <!-- Theme toggle: ID kept so syncAllThemeIcons() in nav_controls.js still finds it -->
    <button
      id="ladySpokeTheme"
      class="lady-util-btn"
      type="button"
      title="Toggle Theme"
      aria-label="Toggle theme"
    >
      <!-- Icon corrected on load by syncAllThemeIcons() in nav_controls.js -->
      <i class="bi bi-circle-half"></i>
    </button>

    <!-- Fullscreen: data-fullscreen + data-fullscreen-label wired by global.js -->
    <button
      id="ladySpokeFullscreen"
      class="lady-util-btn"
      type="button"
      title="Fullscreen"
      aria-label="Toggle fullscreen"
      data-fullscreen
      data-fullscreen-label="icon"
    >
      <i class="bi bi-fullscreen"></i>
    </button>

    <!-- Metrics refresh: triggers window.fetchMetrics() via global.js -->
    <button
      id="ladySpokeMetrics"
      class="lady-util-btn"
      type="button"
      title="Refresh Metrics"
      aria-label="Refresh metrics"
    >
      <i class="bi bi-arrow-clockwise"></i>
    </button>

  </div>

  <!-- Expand button: reveals/hides utility tray -->
  <button id="ladyExpandBtn" class="lady-expand-btn" type="button" aria-label="Toggle utilities" title="Utilities">
    <i class="bi bi-plus"></i>
  </button>

  <!-- Orb: primary action - opens console panel immediately -->
  <button id="ladyBtn" class="lady-btn" type="button" aria-label="Open Lady Linux console">
    &#129504;
  </button>

</div>

<!-- -- Floating console panel (unchanged from before) -- -->
<div id="ladyPanel" class="lady-panel hidden" aria-hidden="true">

  <div class="lady-header">
    <span>Lady</span>
    <button id="ladyClose" class="lady-close" type="button" aria-label="Close Lady panel">
      &times;
    </button>
  </div>

  <!-- Response output area - wired by ladyWidget.js -->
  <div id="lady-response" class="flex-grow-1 overflow-auto"></div>

  <!-- Memory panel (collapsible) -->
  <div class="lady-memory" style="border-top: 1px solid var(--border-color); padding-top: 0.75rem;">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="fw-semibold" style="font-size: 0.8rem; color: var(--text-muted);">
        What Lady Remembers
      </span>
      <button
        type="button"
        class="lady-close"
        id="ladyMemoryToggle"
        aria-label="Toggle memory panel"
        aria-expanded="true"
        aria-controls="ladyMemoryBody"
        title="Toggle memory"
        style="font-size: 0.9rem;"
      >
        <i class="bi bi-chevron-down" id="ladyMemoryChevron"></i>
      </button>
    </div>
    <div id="ladyMemoryBody">
      <ul class="activity-log" id="ladyMemoryList">
        <li><em style="color: var(--text-muted); font-size: 0.8rem;">No memories yet.</em></li>
      </ul>
    </div>
  </div>

  <!-- Input row -->
  <div class="lady-input">
    <input
      id="lady-input"
      type="text"
      class="form-control form-control-sm"
      placeholder="Ask Lady Linux..."
      autocomplete="off"
    />
  </div>

</div>
