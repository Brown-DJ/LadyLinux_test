<button id="ladyBtn" class="lady-btn" type="button" title="Open Lady panel">
  &#129504;
</button>

<div id="ladyPanel" class="lady-panel hidden" aria-hidden="true">
  <div class="lady-header">
    <span>Lady</span>
    <button id="ladyClose" class="lady-close" type="button" aria-label="Close Lady panel">
      &times;
    </button>
  </div>

  <div class="lady-actions">
    <button id="ladyRefreshMetrics" class="btn btn-sm btn-outline-light" type="button">
      Refresh Metrics
    </button>
    <button id="ladyToggleTheme" class="btn btn-sm btn-outline-light" type="button">
      Toggle Theme
    </button>
    <button
      data-fullscreen
      data-fullscreen-label="text"
      class="btn btn-sm btn-outline-light"
      type="button"
      title="Fullscreen"
    >
      Fullscreen
    </button>
  </div>

  <div id="lady-response"></div>

  <div class="lady-input">
    <input id="lady-input" type="text" placeholder="Ask Lady..." autocomplete="off" />
  </div>
</div>
