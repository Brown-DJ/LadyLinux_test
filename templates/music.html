<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lady Linux - Music</title>
  <script>
    document.documentElement.setAttribute("data-ui-ready", "false");
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body data-page="music">
  {% include "nav.html" %}

  {% include "controls.html" %}
  {% include "lady_panel.html" %}

  <main class="container pb-5">
    {% include "context_nav.html" %}

    <section class="music-player-shell">
      <div class="music-visual">
        <img
          id="musicArtwork"
          class="music-artwork"
          src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=900&q=80"
          alt="Live stage lights over a microphone"
        >
      </div>

      <div class="music-panel">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
          <div>
            <p class="text-muted text-uppercase mb-1 music-kicker">Media Player</p>
            <h1 class="h3 mb-0">Now Playing</h1>
          </div>
          <span class="badge text-bg-secondary" id="musicStatusBadge">checking</span>
        </div>

        <div class="music-track-block mb-4">
          <p class="music-track-title mb-1" id="musicTitle">No track loaded</p>
          <p class="music-track-meta mb-0" id="musicArtist">Open Spotify, VLC, Firefox, or another MPRIS player.</p>
          <p class="text-muted mb-0 mt-1" id="musicAlbum"></p>
        </div>

        <div class="music-controls" aria-label="Playback controls">
          <button class="btn btn-outline-secondary music-control-btn" type="button" data-media-action="previous" aria-label="Previous track">
            <i class="bi bi-skip-backward-fill"></i>
          </button>
          <button class="btn btn-primary music-control-btn music-control-main" type="button" data-media-action="toggle" aria-label="Toggle playback">
            <i class="bi bi-play-fill" id="musicToggleIcon"></i>
          </button>
          <button class="btn btn-outline-secondary music-control-btn" type="button" data-media-action="next" aria-label="Next track">
            <i class="bi bi-skip-forward-fill"></i>
          </button>
          <button class="btn btn-outline-secondary music-control-btn" type="button" data-media-action="stop" aria-label="Stop playback">
            <i class="bi bi-stop-fill"></i>
          </button>
          <button class="btn btn-outline-secondary music-control-btn" type="button" id="musicRefreshBtn" aria-label="Refresh now playing">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>

        <div class="response-area mt-4 mb-0" id="musicMessage">
          Ready.
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/themes.js"></script>
  <script src="/static/js/global.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
  (() => {
    const statusBadge = document.getElementById("musicStatusBadge");
    const title = document.getElementById("musicTitle");
    const artist = document.getElementById("musicArtist");
    const album = document.getElementById("musicAlbum");
    const message = document.getElementById("musicMessage");
    const toggleIcon = document.getElementById("musicToggleIcon");

    function setMessage(text) {
      if (message) message.textContent = text;
    }

    function setStatus(data) {
      const playing = Boolean(data.playing);
      const hasPlayer = data.status && data.status !== "No player";

      statusBadge.textContent = hasPlayer ? data.status : "no player";
      statusBadge.className = `badge ${playing ? "text-bg-success" : "text-bg-secondary"}`;
      toggleIcon.className = playing ? "bi bi-pause-fill" : "bi bi-play-fill";

      title.textContent = data.title || "No track loaded";
      artist.textContent = data.artist || "Open Spotify, VLC, Firefox, or another MPRIS player.";
      album.textContent = data.album || "";
      setMessage(data.message || "Status updated.");
    }

    async function loadStatus() {
      try {
        const response = await fetch("/api/media/status");
        const data = await response.json();
        setStatus(data);
      } catch (error) {
        statusBadge.textContent = "error";
        statusBadge.className = "badge text-bg-danger";
        setMessage(`Unable to load media status: ${error.message}`);
      }
    }

    async function runAction(action) {
      setMessage("Sending command...");
      try {
        const response = await fetch(`/api/media/${action}`, { method: "POST" });
        const data = await response.json();
        setMessage(data.message || "Command sent.");
        await loadStatus();
      } catch (error) {
        setMessage(`Command failed: ${error.message}`);
      }
    }

    document.querySelectorAll("[data-media-action]").forEach((button) => {
      button.addEventListener("click", () => runAction(button.dataset.mediaAction));
    });

    document.getElementById("musicRefreshBtn")?.addEventListener("click", loadStatus);

    loadStatus();
    setInterval(loadStatus, 5000);
  })();
  </script>
</body>
</html>
