<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lady Linux - Music</title>
  <script>
    document.documentElement.setAttribute("data-ui-ready", "false");
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body data-page="music">
  {% include "nav.html" %}

  {% include "controls.html" %}
  {% include "lady_panel.html" %}

  <main class="container pb-5">
    {% include "context_nav.html" %}
    <div class="music-bg-blur" id="musicBgBlur"></div>

    <!-- Left column: artwork -->
    <div class="music-visual">
      <img
        id="musicArtwork"
        class="music-artwork"
        src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=900&q=80"
        alt="Album artwork"
      >
    </div>

    <!-- Right column: info + controls -->
    <div class="music-panel">

      <!-- Header row -->
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <div>
          <p class="text-muted text-uppercase mb-1 music-kicker">Now Playing</p>
          <!-- Player identity badge (Spotify / VLC / etc) -->
          <span class="badge text-bg-secondary music-player-badge" id="musicPlayerBadge">-</span>
        </div>
        <span class="badge" id="musicStatusBadge">checking</span>
      </div>

      <!-- Track metadata -->
      <div class="music-track-block mb-3">
        <p class="music-track-title mb-1" id="musicTitle">No track loaded</p>
        <p class="music-track-meta mb-0" id="musicArtist">
          Open Spotify, VLC, or another MPRIS player.
        </p>
        <p class="text-muted small mb-0 mt-1" id="musicAlbum"></p>
      </div>

      <!-- Progress bar + timestamps -->
      <div class="music-progress-wrap mb-1">
        <div class="music-progress-bar-track">
          <div class="music-progress-bar-fill" id="musicProgressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="d-flex justify-content-between mb-3">
        <span class="music-time-label" id="musicPosLabel">0:00</span>
        <span class="music-time-label" id="musicDurLabel">0:00</span>
      </div>

      <!-- Playback controls row -->
      <div class="music-controls mb-3" aria-label="Playback controls">
        <!-- Shuffle toggle -->
        <button class="btn btn-outline-secondary music-control-btn music-btn-icon"
          type="button" id="musicShuffleBtn" title="Shuffle">
          <i class="bi bi-shuffle"></i>
        </button>

        <button class="btn btn-outline-secondary music-control-btn music-btn-icon"
          type="button" data-media-action="previous" aria-label="Previous">
          <i class="bi bi-skip-backward-fill"></i>
        </button>

        <!-- Main play/pause - larger -->
        <button class="btn btn-primary music-control-btn music-control-main music-btn-icon"
          type="button" data-media-action="toggle" aria-label="Toggle playback">
          <i class="bi bi-play-fill" id="musicToggleIcon"></i>
        </button>

        <button class="btn btn-outline-secondary music-control-btn music-btn-icon"
          type="button" data-media-action="next" aria-label="Next">
          <i class="bi bi-skip-forward-fill"></i>
        </button>

        <!-- Loop/repeat toggle -->
        <button class="btn btn-outline-secondary music-control-btn music-btn-icon"
          type="button" id="musicLoopBtn" title="Repeat">
          <i class="bi bi-repeat"></i>
        </button>

        <button class="btn btn-outline-secondary music-control-btn music-btn-icon"
          type="button" data-media-action="stop" aria-label="Stop">
          <i class="bi bi-stop-fill"></i>
        </button>
      </div>

      <!-- Volume slider row -->
      <div class="d-flex align-items-center gap-2 mb-4">
        <i class="bi bi-volume-down text-muted"></i>
        <input type="range" class="music-volume-slider" id="musicVolumeSlider"
          min="0" max="100" value="80" aria-label="Volume">
        <i class="bi bi-volume-up text-muted"></i>
      </div>

      <!-- System context strip -->
      <div class="music-sys-strip mb-3" id="musicSysStrip">
        <span class="music-sys-item" id="sysCpu"><i class="bi bi-cpu"></i> -</span>
        <span class="music-sys-item" id="sysOutput"><i class="bi bi-speaker"></i> -</span>
        <span class="music-sys-item" id="sysNet"><i class="bi bi-wifi"></i> -</span>
      </div>

      <!-- Live event log -->
      <div class="music-event-log" id="musicEventLog" aria-live="polite"></div>

    </div><!-- /music-panel -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/themes.js"></script>
  <script src="/static/js/global.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
  (() => {
    const statusBadge = document.getElementById("musicStatusBadge");
    const playerBadge = document.getElementById("musicPlayerBadge");
    const title = document.getElementById("musicTitle");
    const artist = document.getElementById("musicArtist");
    const album = document.getElementById("musicAlbum");
    const toggleIcon = document.getElementById("musicToggleIcon");
    const progressFill = document.getElementById("musicProgressFill");
    const posLabel = document.getElementById("musicPosLabel");
    const durLabel = document.getElementById("musicDurLabel");
    const volumeSlider = document.getElementById("musicVolumeSlider");
    const shuffleBtn = document.getElementById("musicShuffleBtn");
    const loopBtn = document.getElementById("musicLoopBtn");
    const eventLog = document.getElementById("musicEventLog");
    const sysCpu = document.getElementById("sysCpu");
    const sysOutput = document.getElementById("sysOutput");
    const sysNet = document.getElementById("sysNet");
    const bgBlur = document.getElementById("musicBgBlur");

    let lastTrackKey = "";
    let volumeEditing = false;
    let volumeTimer = null;

    function addLog(text) {
      if (!eventLog) return;
      const line = document.createElement("div");
      line.className = "music-log-line";
      line.textContent = `${new Date().toLocaleTimeString()}  ${text}`;
      eventLog.prepend(line);

      while (eventLog.children.length > 24) {
        eventLog.removeChild(eventLog.lastElementChild);
      }
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.floor(Number(seconds) || 0));
      const mins = Math.floor(total / 60);
      const secs = total % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function formatRate(bytesPerSec) {
      const rate = Number(bytesPerSec) || 0;
      if (rate >= 1024 * 1024) return `${(rate / 1024 / 1024).toFixed(1)} MB/s`;
      if (rate >= 1024) return `${(rate / 1024).toFixed(0)} KB/s`;
      return `${rate.toFixed(0)} B/s`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function setTrackText(data) {
      const trackKey = `${data.title || ""}|${data.artist || ""}|${data.album || ""}`;
      if (trackKey !== lastTrackKey && lastTrackKey) {
        title.classList.add("music-track-fade");
        window.setTimeout(() => title.classList.remove("music-track-fade"), 220);
      }
      lastTrackKey = trackKey;

      title.textContent = data.title || "No track loaded";
      artist.textContent = data.artist || "Open Spotify, VLC, or another MPRIS player.";
      album.textContent = data.album || "";
    }

    function setStatus(data) {
      const playing = Boolean(data.playing);
      const hasPlayer = data.status && data.status !== "No player";
      const duration = Number(data.duration_sec) || 0;
      const position = Number(data.position_sec) || 0;
      const progress = duration > 0 ? Math.min(100, Math.max(0, (position / duration) * 100)) : 0;

      statusBadge.textContent = hasPlayer ? data.status : "no player";
      statusBadge.className = `badge ${playing ? "text-bg-success" : "text-bg-secondary"}`;
      playerBadge.textContent = data.player_name || "-";
      toggleIcon.className = playing ? "bi bi-pause-fill" : "bi bi-play-fill";
      progressFill.style.width = `${progress}%`;
      posLabel.textContent = formatTime(position);
      durLabel.textContent = formatTime(duration);
      shuffleBtn.classList.toggle("active", Boolean(data.shuffle));
      loopBtn.classList.toggle("active", data.loop_status && data.loop_status !== "None");
      loopBtn.title = `Repeat: ${data.loop_status || "None"}`;

      if (!volumeEditing && typeof data.volume === "number") {
        volumeSlider.value = Math.round(data.volume * 100);
      }

      if (bgBlur) bgBlur.style.opacity = hasPlayer ? "1" : "0";
      setTrackText(data);
    }

    async function loadStatus() {
      try {
        const response = await fetch("/api/media/status", { cache: "no-store" });
        const data = await response.json();
        setStatus(data);
      } catch (error) {
        statusBadge.textContent = "error";
        statusBadge.className = "badge text-bg-danger";
        addLog(`Status failed: ${error.message}`);
      }
    }

    async function runAction(action) {
      addLog(`Sending ${action}`);
      try {
        const response = await fetch(`/api/media/${action}`, { method: "POST" });
        const data = await response.json();
        addLog(data.message || "Command sent");
        await loadStatus();
      } catch (error) {
        addLog(`${action} failed: ${error.message}`);
      }
    }

    async function setVolume(value) {
      try {
        const response = await fetch("/api/media/volume", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ level: Number(value) / 100 }),
        });
        const data = await response.json();
        addLog(data.message || "Volume updated");
      } catch (error) {
        addLog(`Volume failed: ${error.message}`);
      } finally {
        volumeEditing = false;
      }
    }

    async function loadSinks() {
      try {
        const response = await fetch("/api/media/sinks", { cache: "no-store" });
        const data = await response.json();
        const sinks = Array.isArray(data.sinks) ? data.sinks : [];
        const active = sinks.find((sink) => sink.state === "RUNNING") || sinks[0];
        sysOutput.innerHTML = `<i class="bi bi-speaker"></i> ${active ? escapeHtml(active.name) : "-"}`;
      } catch (error) {
        sysOutput.innerHTML = '<i class="bi bi-speaker"></i> unavailable';
      }
    }

    async function loadSystemContext() {
      try {
        const response = await fetch("/api/system/metrics", { cache: "no-store" });
        const data = await response.json();
        const cpu = data?.cpu?.percent ?? data?.cpu_load ?? 0;
        const down = data?.network?.download_speed ?? data?.network_download_speed ?? 0;
        const up = data?.network?.upload_speed ?? data?.network_upload_speed ?? 0;
        sysCpu.innerHTML = `<i class="bi bi-cpu"></i> CPU ${Number(cpu).toFixed(0)}%`;
        sysNet.innerHTML = `<i class="bi bi-wifi"></i> ${formatRate(down)} down / ${formatRate(up)} up`;
      } catch (error) {
        sysCpu.innerHTML = '<i class="bi bi-cpu"></i> CPU -';
        sysNet.innerHTML = '<i class="bi bi-wifi"></i> network -';
      }
    }

    document.querySelectorAll("[data-media-action]").forEach((button) => {
      button.addEventListener("click", () => runAction(button.dataset.mediaAction));
    });

    shuffleBtn.addEventListener("click", () => runAction("shuffle"));
    loopBtn.addEventListener("click", () => runAction("loop"));
    volumeSlider.addEventListener("input", () => {
      volumeEditing = true;
      window.clearTimeout(volumeTimer);
      volumeTimer = window.setTimeout(() => setVolume(volumeSlider.value), 220);
    });

    addLog("Ready");
    loadStatus();
    loadSinks();
    loadSystemContext();
    window.setInterval(loadStatus, 2000);
    window.setInterval(loadSinks, 15000);
    window.setInterval(loadSystemContext, 5000);
  })();
  </script>
</body>
</html>
