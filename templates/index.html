<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lady Linux</title>

  <script>
    document.documentElement.setAttribute("data-ui-ready", "false");
  </script>

  <!-- Styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>

<body data-page="index">

  {% include "nav.html" %}
  {% include "controls.html" %}
  {% include "lady_panel.html" %}

  <!-- MAIN DASHBOARD -->
  <main class="container-fluid px-3 px-md-4 pb-4">

    {% include "context_nav.html" %}

    <div class="row g-4" id="dashboard-sortable">

      <!-- =========================
           AI CONSOLE (PRIMARY)
      ========================== -->
      <div class="col-12" data-widget-id="ai-console">
        <section class="card ll-dashboard-card ll-console h-100">
          <div class="card-body d-flex flex-column">

            <div class="d-flex align-items-center mb-3">
              <h1 class="h4 mb-0">AI Console</h1>
              <span id="chatStatus" class="chat-status ms-3" data-state="idle">idle</span>
              <span class="ll-drag-handle ms-auto">
                <i class="bi bi-grip-vertical"></i>
              </span>
            </div>

            <!-- Response -->
            <div id="chatResponse" class="chat-response-stream flex-grow-1 mb-3">
              <p class="text-muted mb-2">System ready.</p>
            </div>

            <div id="chatConfirmation" class="chat-confirmation d-none"></div>

            <!-- Input -->
            <form id="ucsChatForm" class="d-flex gap-2">
              <input
                type="text"
                id="ucsPrompt"
                class="form-control"
                placeholder="Type command..."
                autocomplete="off"
              >

              <button type="submit" class="btn btn-primary">
                <i class="bi bi-arrow-right"></i>
              </button>

              <button
                type="button"
                class="btn btn-outline-secondary"
                data-mic-btn
                data-voice-source="console"
              >
                <i class="bi bi-mic"></i>
              </button>
            </form>

          </div>
        </section>
      </div>

      <!-- =========================
           SYSTEM METRICS
      ========================== -->
      <div class="col-12" data-widget-id="metric-cards">
        <section class="card ll-dashboard-card">
          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h6 text-muted mb-0">System Metrics</h2>
              <span class="ll-drag-handle">
                <i class="bi bi-grip-vertical"></i>
              </span>
            </div>

            <div class="row g-3">

              <!-- CPU -->
              <div class="col-md-4">
                <div class="card ll-metric-card h-100">
                  <div class="card-body">
                    <h6>CPU</h6>
                    <p id="cpuLoad" class="display-6">--%</p>
                    <div class="progress">
                      <div id="cpuProgress" class="progress-bar" style="width:0%"></div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Memory -->
              <div class="col-md-4">
                <div class="card ll-metric-card h-100">
                  <div class="card-body">
                    <h6>Memory</h6>
                    <p id="memoryUsage" class="display-6">--%</p>
                    <div class="progress">
                      <div id="memoryProgress" class="progress-bar" style="width:0%"></div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Disk -->
              <div class="col-md-4">
                <div class="card ll-metric-card h-100">
                  <div class="card-body">
                    <h6>Disk</h6>
                    <p id="diskUsage" class="display-6">--%</p>
                    <div class="progress">
                      <div id="diskProgress" class="progress-bar" style="width:0%"></div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </section>
      </div>

      <!-- =========================
           ACTIONS + ACTIVITY
      ========================== -->
      <div class="col-lg-6" data-widget-id="ask-panel">
        <section class="card ll-dashboard-card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-3">
              <h5>Quick Actions</h5>
              <span class="ll-drag-handle"><i class="bi bi-grip-vertical"></i></span>
            </div>

            <div class="list-group">
              <button class="list-group-item ask-item" data-prompt="optimize system performance">
                Optimize performance
              </button>
              <button class="list-group-item ask-item" data-prompt="clean logs">
                Clean logs
              </button>
              <button class="list-group-item ask-item" data-prompt="restart services">
                Restart services
              </button>
            </div>
          </div>
        </section>
      </div>

      <div class="col-lg-6" data-widget-id="activity">
        <section class="card ll-dashboard-card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-3">
              <h5>Activity</h5>
              <span class="ll-drag-handle"><i class="bi bi-grip-vertical"></i></span>
            </div>

            <div id="systemActivity" class="activity-feed">
              <ul class="activity-log">
                <li>System initialized</li>
              </ul>
            </div>
          </div>
        </section>
      </div>

      <!-- =========================
           MODULE NAVIGATION
      ========================== -->
      <div class="col-12" data-widget-id="module-buttons">
        <section class="row g-3">

          <div class="col-md-4">
            <a href="/os" class="card ll-module-card text-center h-100">
              <div class="card-body">
                <i class="bi bi-cpu fs-2"></i>
                <p class="mt-2 mb-0">System</p>
              </div>
            </a>
          </div>

          <div class="col-md-4">
            <a href="/users" class="card ll-module-card text-center h-100">
              <div class="card-body">
                <i class="bi bi-people fs-2"></i>
                <p class="mt-2 mb-0">Users</p>
              </div>
            </a>
          </div>

          <div class="col-md-4">
            <a href="/network" class="card ll-module-card text-center h-100">
              <div class="card-body">
                <i class="bi bi-globe fs-2"></i>
                <p class="mt-2 mb-0">Network</p>
              </div>
            </a>
          </div>

        </section>
      </div>

    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/static/js/design_engine.js"></script>
  <script src="/static/js/themes.js"></script>
  <script src="/static/js/nav_controls.js" defer></script>
  <script src="/static/js/global.js"></script>

  <script type="module" src="/static/js/ui_event_bus.js"></script>
  <script type="module" src="/static/js/system_metrics.js"></script>
  <script src="/static/js/actions.js"></script>
  <script src="/static/js/main.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/ladyWidget.js"></script>
  <script src="/static/js/voice_client.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <script src="/static/js/dnd.js"></script>
  <script type="module" src="/static/js/dashboard.js"></script>

</body>
</html>
