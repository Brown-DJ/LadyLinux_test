<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lady Shell</title>

  <script>
    document.documentElement.setAttribute("data-ui-ready", "false");
  </script>

  <!-- Minimal styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #0b0f14;
      color: #d1d5db;
      font-family: "JetBrains Mono", monospace;
    }

    .topbar {
      background: #111827;
      padding: 8px 12px;
      border-bottom: 1px solid #1f2937;
      font-size: 0.9rem;
    }

    .terminal {
      height: calc(100vh - 90px);
      overflow-y: auto;
      padding: 20px;
    }

    .line {
      margin-bottom: 6px;
    }

    .prompt {
      color: #60a5fa;
    }

    .response {
      color: #9ca3af;
      margin-left: 10px;
    }

    .input-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111827;
      border-top: 1px solid #1f2937;
      padding: 10px;
    }

    .input-bar input {
      background: #0b0f14;
      border: none;
      color: white;
    }

    .status {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
    }

    .status span {
      opacity: 0.8;
    }

    .side-panel {
      position: fixed;
      right: 0;
      top: 40px;
      width: 260px;
      height: calc(100% - 90px);
      background: #0f172a;
      border-left: 1px solid #1f2937;
      padding: 10px;
      overflow-y: auto;
    }

    .side-panel h6 {
      color: #60a5fa;
      margin-bottom: 10px;
    }

    .command-hint {
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
    }

    .command-hint:hover {
      background: #1f2937;
    }
  </style>
</head>

<body>

  <!-- TOP STATUS BAR -->
  <div class="topbar d-flex justify-content-between align-items-center">
    <div>Lady Shell</div>
    <div class="status">
      <span id="cpuLoad">CPU: --%</span>
      <span id="memoryUsage">RAM: --%</span>
      <span id="diskUsage">Disk: --%</span>
    </div>
  </div>

  <!-- TERMINAL -->
  <div id="chatResponse" class="terminal">
    <div class="line">
      <span class="prompt">lady@system:~$</span>
      <span class="response">system initialized</span>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">
    <h6>Quick Commands</h6>

    <div class="command-hint" data-prompt="status">
      status → show system metrics
    </div>

    <div class="command-hint" data-prompt="clean logs">
      clean logs
    </div>

    <div class="command-hint" data-prompt="restart services">
      restart services
    </div>

    <div class="command-hint" data-prompt="open system panel">
      open system panel
    </div>

    <hr>

    <h6>Recent Activity</h6>
    <ul id="systemActivity">
      <li>boot sequence complete</li>
    </ul>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <form id="ucsChatForm" class="d-flex align-items-center gap-2">

      <span class="prompt">></span>

      <input
        type="text"
        id="ucsPrompt"
        class="form-control"
        placeholder="enter command..."
        autocomplete="off"
      >

      <button type="submit" class="btn btn-primary">
        run
      </button>

      <button
        type="button"
        class="btn btn-outline-secondary"
        data-mic-btn
        data-voice-source="console"
      >
        <i class="bi bi-mic"></i>
      </button>

    </form>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/static/js/global.js"></script>
  <script type="module" src="/static/js/system_metrics.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/actions.js"></script>
  <script src="/static/js/voice_client.js"></script>

  <script>
    // Quick command click injection
    document.querySelectorAll(".command-hint").forEach(el => {
      el.addEventListener("click", () => {
        document.getElementById("ucsPrompt").value = el.dataset.prompt;
        document.getElementById("ucsPrompt").focus();
      });
    });
  </script>

</body>
</html>
