<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lady Linux - Users</title>
  <script>
    document.documentElement.setAttribute("data-ui-ready", "false");
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body data-page="users">
  <!-- Shared top navigation shell for all active pages -->
  <nav class="navbar navbar-expand-lg ll-topbar mb-4">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="ll-logo" aria-hidden="true">LL</span>
        <span class="fw-semibold">Lady Linux</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#llMainNav" aria-controls="llMainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="llMainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="/os"><i class="bi bi-cpu me-1"></i>System</a></li>
          <li class="nav-item"><a class="nav-link" href="/users"><i class="bi bi-people me-1"></i>Users</a></li>
          <li class="nav-item"><a class="nav-link" href="/firewall"><i class="bi bi-shield-lock me-1"></i>Firewall</a></li>
          <li class="nav-item">
            <button class="btn btn-link nav-link" type="button" aria-label="Notifications"><i class="bi bi-bell"></i></button>
          </li>
          <li class="nav-item">
            <button class="btn btn-link nav-link" type="button" aria-label="Settings"><i class="bi bi-gear"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hidden nav loader target kept for script compatibility -->
  <nav id="nav-container" class="d-none" aria-hidden="true"></nav>

  <main class="container pb-4">
    <div class="row g-4">
      <div class="col-12 col-lg-8">
        <!-- User List -->
        <section class="card ll-dashboard-card h-100">
          <div class="card-body">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
              <h1 class="h4 mb-0">User List</h1>
              <div class="d-flex gap-2">
                <button class="btn btn-primary btn-sm" type="button">Add user</button>
                <button class="btn btn-outline-secondary btn-sm" type="button">Edit user</button>
                <button class="btn btn-outline-secondary btn-sm" type="button">Remove user</button>
              </div>
            </div>

            <!-- Existing id kept so actions.js can mutate users -->
            <div class="table-responsive">
              <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Last Login</th>
                  </tr>
                </thead>
                <tbody id="userList">
                  <tr data-username="name">
                    <td class="user-name">NAME</td>
                    <td><span class="badge user-role">Admin</span></td>
                    <td>Active</td>
                    <td>Today 09:32</td>
                  </tr>
                  <tr data-username="guest">
                    <td class="user-name">guest</td>
                    <td><span class="badge user-role">Standard</span></td>
                    <td>Idle</td>
                    <td>Today 08:10</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </div>

      <div class="col-12 col-lg-4">
        <div class="row g-4">
          <!-- Active Sessions -->
          <div class="col-12">
            <section class="card ll-dashboard-card">
              <div class="card-body">
                <h2 class="h5 mb-3">Active Sessions</h2>
                <ul class="list-group ll-action-list">
                  <li class="list-group-item d-flex justify-content-between"><span>admin@tty1</span><small>2h 14m</small></li>
                  <li class="list-group-item d-flex justify-content-between"><span>guest@pts0</span><small>18m</small></li>
                  <li class="list-group-item d-flex justify-content-between"><span>service@api</span><small>always on</small></li>
                </ul>
              </div>
            </section>
          </div>

          <!-- Permissions -->
          <div class="col-12">
            <section class="card ll-dashboard-card">
              <div class="card-body">
                <h2 class="h5 mb-3">Permissions</h2>
                <div class="d-grid gap-2">
                  <button class="btn btn-outline-secondary" id="addUserBtn" type="button" disabled>Add User via Assistant</button>
                  <button class="btn btn-outline-secondary" id="changePasswordBtn" type="button" disabled>Edit Password via Assistant</button>
                  <button class="btn btn-outline-secondary" id="removeUserBtn" type="button" disabled>Remove User via Assistant</button>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Floating Lady widget (mini console) -->
  <div id="lady-widget">
    <button id="lady-launcher" title="Ask Lady">&#129504;</button>
    <div id="lady-console">
      <div class="lady-header">Lady <span id="lady-close">&times;</span></div>
      <div id="lady-response"></div>
      <input id="lady-input" placeholder="Ask Lady Linux..." autocomplete="off" />
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/design_engine.js"></script>
  <script src="/static/js/themes.js"></script>
  <script src="/static/js/ui_event_bus.js"></script>
  <script src="/static/js/actions.js"></script>
  <script src="/static/js/main.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/ladyWidget.js"></script>
</body>
</html>
